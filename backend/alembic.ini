# Alembic configuration.
#
# Migration scripts live in `backend/db/migrations`. The connection URL is
# NOT set here — `env.py` reads it from `Settings.database.url` so the
# same `DATABASE_URL` that the runtime app uses also drives migrations.
# This keeps the dev / CI / Neon flows identical.

[alembic]
script_location = backend/db/migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
