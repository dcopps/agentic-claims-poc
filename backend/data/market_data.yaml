# Market-data settlement ranges per (claim_type, severity) cell.
#
# This file is the Adjuster agent's source of truth for the range it
# instructs the LLM to pick within. The LLM never invents the range;
# it only selects within bounds the table provides. A value the model
# returns outside the looked-up range is caught by the Adjuster's
# parse-time guard and surfaces as a hard error, not a silent clamp.
#
# Severity is derived inside the Adjuster from `reported_amount` using
# the `severity_bands` block below — never an LLM-supplied field.
# Walk bands in declaration order (minor → moderate → severe); the
# first band whose `max_amount` is null or `>=` reported_amount wins.
#
# Ranges are inclusive on both ends. Currency is USD throughout.
#
# The three locked demo scenarios are sized to land comfortably inside
# their respective cells:
#   - $85,000 water_damage → water_damage / moderate (range 50k–200k)
#   - $850,000 fire → fire / severe (range 500k–1.5M)
#   - $1,400,000 storm_complex → storm_complex / severe (range 600k–1.8M)
#
# Adding or renaming a claim_type is an interface-stability event:
# every downstream consumer that pattern-matches claim_type strings
# must be updated in the same change.

version: 1
claim_types:
  water_damage:
    severity_bands:
      minor:    {max_amount: 50000}
      moderate: {max_amount: 150000}
      severe:   {max_amount: null}
    ranges:
      minor:    {floor: 5000,   ceiling: 50000}
      moderate: {floor: 50000,  ceiling: 200000}
      severe:   {floor: 200000, ceiling: 800000}
  fire:
    severity_bands:
      minor:    {max_amount: 100000}
      moderate: {max_amount: 500000}
      severe:   {max_amount: null}
    ranges:
      minor:    {floor: 20000,  ceiling: 120000}
      moderate: {floor: 120000, ceiling: 600000}
      severe:   {floor: 500000, ceiling: 1500000}
  wind:
    severity_bands:
      minor:    {max_amount: 75000}
      moderate: {max_amount: 300000}
      severe:   {max_amount: null}
    ranges:
      minor:    {floor: 5000,   ceiling: 100000}
      moderate: {floor: 75000,  ceiling: 400000}
      severe:   {floor: 250000, ceiling: 1200000}
  theft:
    severity_bands:
      minor:    {max_amount: 30000}
      moderate: {max_amount: 100000}
      severe:   {max_amount: null}
    ranges:
      minor:    {floor: 2000,   ceiling: 40000}
      moderate: {floor: 25000,  ceiling: 150000}
      severe:   {floor: 100000, ceiling: 500000}
  flood:
    severity_bands:
      minor:    {max_amount: 60000}
      moderate: {max_amount: 250000}
      severe:   {max_amount: null}
    ranges:
      minor:    {floor: 10000,  ceiling: 80000}
      moderate: {floor: 50000,  ceiling: 300000}
      severe:   {floor: 200000, ceiling: 1000000}
  storm_complex:
    severity_bands:
      minor:    {max_amount: 150000}
      moderate: {max_amount: 600000}
      severe:   {max_amount: null}
    ranges:
      minor:    {floor: 25000,  ceiling: 200000}
      moderate: {floor: 150000, ceiling: 700000}
      severe:   {floor: 600000, ceiling: 1800000}
