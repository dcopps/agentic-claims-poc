title: Agentic Insurance Claims Processing — Proof of Concept
description: >-
  Multi-agent AI prototype and reference architecture for commercial property
  insurance claims processing in a regulated context. Provider substitutability
  via an LLM Gateway, retrieval-augmented coverage validation, a SHA-256
  hash-chained audit vault, and human-in-the-loop escalation.

# Default Jekyll theme used by GitHub Pages
theme: minima

# Site language
lang: en-IE

# Short explicit nav. Site title links home; these are the only other
# entries. Empty array does NOT work — minima treats it as falsy and
# falls back to auto-listing every titled page in the repo.
header_pages:
  - diagrams/README.md
  - docs/prompts/README.md

# Stop jekyll-titles-from-headings (auto-enabled on GitHub Pages) from
# extracting the README's first H1 into page.title, which otherwise
# causes minima to render that title above the content's own H1 —
# producing a duplicate heading on the homepage.
titles_from_headings:
  enabled: false

# Keep Jekyll from rendering code, build artefacts, lock files, and internal
# project documents as web pages.
exclude:
  - .claude/
  - .github/
  - .mypy_cache/
  - .pytest_cache/
  - .ruff_cache/
  - .venv/
  - backend/
  - frontend/
  - infra/
  - node_modules/
  - scripts/
  - vendor/
  - BUILD-PLAN.md
  - CLAUDE.md
  - HANDOFF.md
  - pyproject.toml
  - render.yaml
  - uv.lock
  - "*.lock"
